<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirigiendo... | Income Manage</title>
    
    <!-- Redirección automática después de 0 segundos -->
    <meta http-equiv="refresh" content="0; url=https://projectai-rho.vercel.app/">
    
    <!-- Redirección canónica para buscadores -->
    <link rel="canonical" href="https://projectai-rho.vercel.app/">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: #090e1a;
            color: #f8fafc;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }
        .redirect-card {
            padding: 40px;
            max-width: 420px;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(129, 140, 248, 0.2);
            border-top: 3px solid #818cf8;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 24px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        h1 {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 12px;
        }
        p {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 20px;
        }
        a {
            color: #818cf8;
            text-decoration: none;
            font-weight: 500;
        }
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="redirect-card">
        <div class="spinner"></div>
        <h1>Nos hemos mudado</h1>
        <p>Income Manage ahora se encuentra en una nueva dirección. Serás redirigido automáticamente en un momento.</p>
        <a href="https://projectai-rho.vercel.app/">Ir a la nueva dirección →</a>
    </div>

    <!-- Redirección por JavaScript como respaldo -->
    <script>
        window.location.replace("https://projectai-rho.vercel.app/");
    </script>
</body>
</html>
